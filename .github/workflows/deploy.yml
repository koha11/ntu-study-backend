name: Deploy to cPanel VPS
on:
  push:
    branches:
      - main # Triggers when you merge/push to the main branch

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Speeds up runs by caching node_modules

      - name: Install Dependencies and Build
        run: |
          npm install
          npm run build

      - name: Sync Files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Only sync the production build folder
          local-dir: ./dist/ 
          server-dir: ./dist/