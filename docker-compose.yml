services:
  postgres:
    image: postgres:17-alpine
    container_name: ntu-study-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ntu_study}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ntu-study-mailhog
    ports:
      - '1025:1025' # SMTP port
      - '8025:8025' # Web UI port
    environment:
      MH_STORAGE: memory

volumes:
  postgres_data:
